name: RSS Kontrol

on:
  schedule:
    - cron: "0 * * * *"   # Her saat başı
  workflow_dispatch:        # Manuel tetikleme

jobs:
  check-rss:
    runs-on: ubuntu-latest
    steps:
      - name: RSS beslemelerini kontrol et
        run: |
          HTTP_CODE=$(curl -sL -o /tmp/rss_response.txt -w "%{http_code}" \
            "${{ secrets.SITE_URL }}/api/cron/check-rss")
          echo "HTTP status: $HTTP_CODE"
          cat /tmp/rss_response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Hata: API $HTTP_CODE döndü"
            exit 1
          fi
